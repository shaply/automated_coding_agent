agent:
  max_self_correction_attempts: 3   # per step, before surfacing failure to user
  max_steps_per_session: 20         # safety cap on total plan steps executed per run

project:
  github_repo: shaply/cf_ai_resumebuilder  # repo to clone per task
  github_assignee: shaply                  # GitHub username for scheduled issue pickup
  differentiating_label: BOT_ASSIGNED      # bot only works on issues that also carry this label
  base_branch: main                        # base branch for PRs
  run_tests: false                         # target repo has no test suite
  test_command: pytest                     # command to run if run_tests is true
  lint_command: ruff check .               # linter to run before tests

schedule:
  enabled: true
  time: "23:30"                     # run daily at 11:30 PM
  timezone: "America/New_York"      # used for SQLite daily budget resets

engine:
  provider: aider                   # swap to "my_engine" in Phase 10

providers:
  claude:
    model: anthropic/claude-3-5-sonnet-20241022
    api_key_env: ANTHROPIC_API_KEY  # env var name; provider is skipped if unset
    daily_token_budget: 25000       # free tier daily token limit
    rpm_limit: 5                    # requests per minute (free tier)
    tpm_limit: 25000                # tokens per minute (free tier)
    context_window: 200000
    min_request_interval: 12.0      # seconds between requests (60 / rpm_limit + buffer)
  gemini:
    model: gemini/gemini-2.0-flash
    api_key_env: GEMINI_API_KEY
    daily_token_budget: 1500          # requests per day on free tier
    rpm_limit: 15                     # gemini-2.0-flash free tier: 15 RPM
    tpm_limit: 1000000
    context_window: 1000000
    min_request_interval: 5.0         # 60s / 15 RPM = 4s, add small buffer
  groq:
    model: groq/llama-3.1-70b-versatile
    api_key_env: GROQ_API_KEY
    daily_token_budget: 100000
    rpm_limit: 30
    tpm_limit: 6000
    context_window: 128000
    min_request_interval: 2.0
  fallback_order: [claude, gemini, groq]
  max_retries: 3                    # per provider before triggering fallback (3 keeps total wait reasonable)

ui:
  step_by_step: false               # pause between each plan step for micro-review
