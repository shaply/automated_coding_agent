services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8094:8094"
    volumes:
      - ./data:/data          # session state, SQLite usage DB, logs — NOT the working repo
    env_file:
      - backend/.env          # API keys, AUTODEV_API_TOKEN
    environment:
      - AUTODEV_DATA_DIR=/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
